linkWorkspacePackages: true
preferWorkspacePackages: true
packages:
  - ./packages/*

catalogMode: strict
catalog:
  "@types/node": 26.1.1
  lightningcss: 1.32.0
  rolldown: 1.2.0
  rolldown-plugin-dts: 0.27.9
  typescript: 6.0.3
  yaml: 2.9.0

trustPolicy: no-downgrade
trustPolicyExclude:
  - "@calmdown/*"

minimumReleaseAge: 10080 # 2w
minimumReleaseAgeExclude:
  - "@calmdown/*"
